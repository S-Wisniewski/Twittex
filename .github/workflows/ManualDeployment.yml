name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Wybierz środowisko'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      ecr_hash:
        description: 'Hash obrazu z AWS ECR'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.target_env }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - name: Release Execution
        run: |
          echo "Wdrażam na środowisko: ${{ github.event.inputs.target_env }}"
          echo "Używam obrazu ECR o hashu: ${{ github.event.inputs.ecr_hash }}"
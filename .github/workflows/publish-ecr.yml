name: "3.Build & Push ECR"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and Promote to ECR
    runs-on: ubuntu-latest
    environment: integration
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: twittex-app
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "IMAGE_TAG_FINAL=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Job Summary
        run: |
          echo "### Wersja promowana do Integration" >> $GITHUB_STEP_SUMMARY
          echo "- Repozytorium: twittex-app" >> $GITHUB_STEP_SUMMARY
          echo "- Wersja (Tag): ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Srodowisko: integration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Uzyj tagu ${{ github.ref_name }} w procesie Manual Deploy." >> $GITHUB_STEP_SUMMARY
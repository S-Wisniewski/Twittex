name: CI

on:
  push:
    branches: [main, e2e]
  pull_request:
    branches: [main, e2e]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  quality-frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun x tsc --noEmit
      - run: bun audit

  quality-backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  build:
    name: Build
    needs: [quality-frontend, quality-backend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: twittex-build
          path: src/web/dist/

  summary:
    name: Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "### Twittex CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Frontend Quality: OK" >> $GITHUB_STEP_SUMMARY
          echo "Backend Quality: OK" >> $GITHUB_STEP_SUMMARY
          echo "Build Status: Success" >> $GITHUB_STEP_SUMMARY
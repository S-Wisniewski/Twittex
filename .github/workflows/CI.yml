name: CI

on:
  push:
    branches: [main, e2e]
  pull_request:
    branches: [main, e2e]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.MAIL_USERNAME }}" ]; then
            echo "Error: MAIL_USERNAME secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.MAIL_PASSWORD }}" ]; then
            echo "Error: MAIL_PASSWORD secret is not set."
            exit 1
          fi
          echo "All required secrets are set."

  quality-frontend:
    name: Frontend Quality
    needs: validate-secrets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun x tsc --noEmit
      - run: bun audit

  quality-backend:
    name: Backend Quality
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  build:
    name: Build
    needs: [quality-frontend, quality-backend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: twittex-build
          path: src/web/dist/

  summary:
    name: Summary
    needs: [quality-frontend, quality-backend, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "### Twittex CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Frontend Quality: ${{ needs.quality-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Backend Quality: ${{ needs.quality-backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Build Status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Email Notification
    needs: [quality-frontend, quality-backend, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Success Mail
        if: ${{ needs.build.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: sandbox.smtp.mailtrap.io
          server_port: 2525
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "SUKCES: Projekt Twittex zbudowany pomyślnie"
          to: stanislaw.wisniewski@student.uj.edu.pl
          from: GitHub Actions Twittex
          body: |
            Świetne wieści! Wszystkie testy i proces budowania zakończyły się sukcesem.
            
            Repozytorium: ${{ github.repository }}
            Gałąź: ${{ github.ref_name }}
            Autor: ${{ github.actor }}
            Commit: ${{ github.sha }}
            
            Aplikacja jest gotowa do wdrożenia.
            Szczegóły akcji: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Mail
        if: ${{ needs.quality-frontend.result == 'failure' || needs.quality-backend.result == 'failure' || needs.build.result == 'failure' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: sandbox.smtp.mailtrap.io
          server_port: 2525
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BŁĄD: Pipeline projektu Twittex przerwany"
          to: stanislaw.wisniewski@student.uj.edu.pl
          from: GitHub Actions <ci@twittex.io>
          body: |
            Uwaga! Proces CI napotkał problemy i został przerwany.
            
            Projekt: ${{ github.repository }}
            Gałąź: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Sprawdź logi w GitHub Actions, aby zidentyfikować przyczynę błędu:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
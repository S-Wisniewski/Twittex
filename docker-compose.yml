services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moderation_db
    ports:
      - "5432:5432"

  api:
    build:
      context: ./src/api/ModerationSystem.Api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=moderation_db;Username=admin;Password=password
    depends_on:
      - db

  web:
    build:
      context: ./src/web/moderation-web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
